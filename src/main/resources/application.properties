# ========== 正式环境配置（SQL Server 2014）==========
# 部署正式版本时，请将上面的开发环境配置注释掉，并取消下面正式环境配置的注释
# SQL Server连接URL（添加认证和加密参数）
spring.datasource.url=jdbc:sqlserver://192.168.0.12:1433;DatabaseName=seeyon;maxStatements=0;SelectMethod=cursor;socketTimeout=1800000;trustServerCertificate=true;encrypt=false;authenticationScheme=SqlPassword
spring.datasource.username=sa
spring.datasource.password=ABC@abc123456
spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver

# HikariCP连接池配置
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# MyBatis配置
mybatis-plus.configuration.map-underscore-to-camel-case=true
mybatis-plus.configuration.cache-enabled=false
mybatis-plus.configuration.call-setters-on-nulls=true
mybatis-plus.configuration.jdbc-type-for-null=null
# 使用slf4j作为日志实现，通过logback控制日志级别，减少SQL刷屏
mybatis-plus.configuration.log-impl=org.apache.ibatis.logging.slf4j.Slf4jImpl
mybatis-plus.type-handlers-package=com.tz.mddl.config

