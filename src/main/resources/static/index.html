<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SQL 配置查询 / 数据字典</title>
    <style>
        body { font-family: Arial, "Microsoft YaHei", sans-serif; margin: 16px; }
        .row { margin: 10px 0; }
        input, textarea, button { padding: 8px; font-size: 14px; }
        button { cursor: pointer; }
        pre { background: #f6f6f6; padding: 12px; white-space: pre-wrap; word-break: break-word; }
        .card { border: 1px solid #ddd; border-radius: 8px; padding: 14px; margin-bottom: 16px; }
        .hint { color: #666; font-size: 12px; }
    </style>
</head>
<body>
<h1>SQL 配置查询 / 数据字典</h1>
<p class="hint">运维配置请打开：<a href="/admin.html">可视化配置后台</a>（保存到外置 JSON 目录）</p>

<div class="card">
    <h2>数据字典</h2>
    <div class="row">
        <label>dictType：</label>
        <input id="dictType" style="width: 320px;" placeholder="例如：user_status" />
    </div>
    <div class="row">
        <button onclick="loadDict()">查询数据字典</button>
        <span class="hint">接口：GET <code>/api/dict/{dictType}</code></span>
    </div>
    <pre id="dictResult">{"success":true,"data":[]}</pre>
</div>

<div class="card">
    <h2>SQL 配置驱动查询</h2>
    <div class="row">
        <label>sqlKey：</label>
        <input id="sqlKey" style="width: 320px;" placeholder="例如：user_query" />
    </div>
    <div class="row">
        <label>params(JSON)：</label><br/>
        <textarea id="paramsJson" rows="10" style="width: 100%; max-width: 820px;"
                  placeholder='例如：{"username":"zhang","status":"1"}'>{"username":"zhang","status":"1"}</textarea>
    </div>
    <div class="row">
        <button onclick="runQuery()">执行查询</button>
        <span class="hint">接口：POST <code>/api/query/{sqlKey}</code></span>
    </div>
    <pre id="queryResult">{"success":true,"data":[]}</pre>
</div>

<script>
    function setResult(el, obj) {
        try {
            el.textContent = JSON.stringify(obj, null, 2);
        } catch (e) {
            el.textContent = String(obj);
        }
    }

    async function loadDict() {
        const dictType = document.getElementById('dictType').value.trim();
        const resultEl = document.getElementById('dictResult');
        if (!dictType) {
            setResult(resultEl, { success: false, message: 'dictType 不能为空', data: [] });
            return;
        }

        try {
            const resp = await fetch(`/api/dict/${encodeURIComponent(dictType)}`, { method: 'GET' });
            const json = await resp.json();
            setResult(resultEl, json);
        } catch (e) {
            setResult(resultEl, { success: false, message: e.message, data: [] });
        }
    }

    async function runQuery() {
        const sqlKey = document.getElementById('sqlKey').value.trim();
        const paramsJsonEl = document.getElementById('paramsJson');
        const resultEl = document.getElementById('queryResult');

        if (!sqlKey) {
            setResult(resultEl, { success: false, message: 'sqlKey 不能为空', data: null });
            return;
        }

        let params = {};
        try {
            const text = paramsJsonEl.value.trim();
            params = text ? JSON.parse(text) : {};
        } catch (e) {
            setResult(resultEl, { success: false, message: 'params JSON 格式不正确：' + e.message, data: null });
            return;
        }

        try {
            const resp = await fetch(`/api/query/${encodeURIComponent(sqlKey)}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(params)
            });
            const json = await resp.json();
            setResult(resultEl, json);
        } catch (e) {
            setResult(resultEl, { success: false, message: e.message, data: null });
        }
    }
</script>
</body>
</html>
