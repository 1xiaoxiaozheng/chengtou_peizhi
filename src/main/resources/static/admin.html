<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>数据字典管理后台</title>
    <link rel="stylesheet" href="https://unpkg.com/element-plus@2.5.6/dist/index.css"/>
    <script src="https://unpkg.com/vue@3.4.21/dist/vue.global.prod.js"></script>
    <script src="https://unpkg.com/element-plus@2.5.6/dist/index.full.min.js"></script>
    <style>
        body { margin: 0; font-family: "Microsoft YaHei", Arial, sans-serif; background: #f5f7fa; }
        .page { max-width: 1280px; margin: 0 auto; padding: 16px; }
        .muted { color: #909399; font-size: 12px; }
        .section-title { font-size: 15px; font-weight: 600; margin: 0 0 12px 0; color: #303133; }
        .json-preview { background: #1e1e1e; color: #d4d4d4; padding: 12px; border-radius: 6px; font-size: 12px; line-height: 1.45; overflow: auto; max-height: 360px; white-space: pre-wrap; word-break: break-word; }
        .mb-12 { margin-bottom: 12px; }
    </style>
</head>
<body>
<div id="app" class="page">
    <h2 style="margin:0 0 8px 0;">FACT · 数据字典管理</h2>

    <el-tabs v-model="activeTab" type="border-card" @tab-change="onTabChange">
        <el-tab-pane label="数据字典" name="dict">
            <el-space direction="vertical" :size="12" style="width:100%;" alignment="stretch">
                <div style="display:flex;flex-wrap:wrap;align-items:center;justify-content:space-between;margin-bottom:8px;">
                    <el-space wrap>
                        <el-button type="default" @click="loadDictWithConfirm">刷新</el-button>
                        <el-button type="default" @click="addDictRow">新增一行</el-button>
                        <el-button type="primary" :loading="dictSaving" @click="saveDict">保存全部</el-button>
                        <el-tag v-if="dictDirty" type="warning" size="small">未保存</el-tag>
                    </el-space>
                    <el-space wrap>
                        <el-button type="default" plain :disabled="!dictViewType" :loading="dictExcelExportLoading"
                                   @click="exportDictExcel">
                            <i class="el-icon-download" style="margin-right:4px;"></i>导出 Excel
                        </el-button>
                        <el-button type="default" plain :disabled="!dictViewType" :loading="dictExcelImportLoading"
                                   @click="openDictImportDialog">
                            <i class="el-icon-upload2" style="margin-right:4px;"></i>导入 Excel
                        </el-button>
                        <input id="dictImportFile" type="file" accept=".xlsx,application/vnd.openxmlformats-officedocument.spreadsheetml.sheet" style="display:none" @change="onDictImportFileChange"/>
                    </el-space>
                </div>
                <el-space wrap style="margin:-4px 0 8px 0;">
                    <!-- 主筛选：表名（dictType / mainTable），来源于 form_meta_config.json -->
                    <el-select v-model="dictViewType" clearable placeholder="选择表（dictType）" style="width:260px">
                        <el-option
                                v-for="t in formMetaTableOptions"
                                :key="t.tableName"
                                :label="t.showName + '（' + t.tableName + '）'"
                                :value="t.tableName"
                        />
                    </el-select>
                    <!-- 次筛选：字段名（fieldCode / dictKey），依赖当前表 -->
                    <el-select v-model="dictFieldFilter" clearable placeholder="选择字段（dictKey/fieldCode）" :disabled="!dictViewType" style="width:260px">
                        <el-option v-for="f in dictFieldOptions" :key="f.value" :label="f.label" :value="f.value"/>
                    </el-select>
                    <!-- 关键字：模糊匹配 dictKey / dictValue / remark -->
                    <el-input v-model="dictKeyword" clearable placeholder="搜索 dictKey / 字段名 / 备注" style="width:260px"/>
                    <el-tag type="info" size="small">共 {{ (dictRowsFiltered || []).length }} 条</el-tag>
                    <el-popover v-if="dictViewType && (dictTypeUsedBySqlKeys[dictViewType] || []).length>0" placement="bottom" width="420" trigger="hover">
                        <template #reference>
                            <el-tag type="warning" size="small">
                                被引用 {{ (dictTypeUsedBySqlKeys[dictViewType] || []).length }} 条规则
                            </el-tag>
                        </template>
                        <div class="muted" style="margin-bottom:8px;">引用该 dictType 的 sql_key：</div>
                        <div style="display:flex;flex-wrap:wrap;gap:8px;">
                            <el-tag v-for="k in (dictTypeUsedBySqlKeys[dictViewType] || [])" :key="k" size="small">{{ k }}</el-tag>
                        </div>
                    </el-popover>
                </el-space>
                <el-table :data="dictRowsFiltered" border stripe size="small" style="width:100%">
                    <el-table-column prop="dictType" label="数据库表名称" width="160">
                        <template #default="scope">
                            <el-input v-model="scope.row.dictType" placeholder="如 user_status"/>
                        </template>
                    </el-table-column>
                    <el-table-column prop="dictKey" label="表名" width="200">
                        <template #default="scope">
                            <el-input :model-value="getTableDisplayName(scope.row.dictType)" readonly />
                        </template>
                    </el-table-column>
                    <el-table-column prop="dictValue" label="字段名称" width="140">
                        <template #default="scope"><el-input v-model="scope.row.dictValue"/></template>
                    </el-table-column>
                    <el-table-column prop="remark" label="字段说明" min-width="100">
                        <template #default="scope"><el-input v-model="scope.row.remark"/></template>
                    </el-table-column>
                    <el-table-column label="操作" width="72" fixed="right">
                        <template #default="scope">
                            <el-button type="danger" link @click="removeDictRow(scope.row)">删除</el-button>
                        </template>
                    </el-table-column>
                </el-table>

                <el-dialog v-model="dictImportPreviewOpen" title="导入预览" width="860px" :close-on-click-modal="false" @closed="resetDictImportPreviewState">
                    <div v-if="(dictImportErrors || []).length > 0">
                        <el-alert type="error" :closable="false" show-icon title="预览失败：请先修正 Excel 后再导入" />
                        <el-table :data="dictImportErrors" border size="small" style="width:100%;margin-top:12px;">
                            <el-table-column prop="row" label="行号" width="90" />
                            <el-table-column prop="message" label="错误信息" min-width="240" />
                        </el-table>
                    </div>
                    <div v-else>
                        <el-alert type="info" :closable="false" show-icon>
                            <template #title>
                                <span>
                                    本次导入：总计 {{ (dictImportPreview && dictImportPreview.total) || 0 }} 条，
                                    将更新 {{ (dictImportPreview && dictImportPreview.updated) || 0 }} 条，
                                    将跳过 {{ (dictImportPreview && dictImportPreview.skipped) || 0 }} 条（系统不存在该 dictKey）。
                                </span>
                            </template>
                        </el-alert>
                        <div class="muted" style="margin:10px 0 6px;">预览（最多前 50 行）</div>
                        <el-table :data="(dictImportPreview && dictImportPreview.previewRows) || []" border size="small" style="width:100%;">
                            <el-table-column prop="dictKey" label="dictKey" width="140" />
                            <el-table-column prop="dictValue" label="dictValue" min-width="180" show-overflow-tooltip />
                            <el-table-column prop="remark" label="remark" min-width="160" show-overflow-tooltip />
                        </el-table>
                    </div>
                    <template #footer>
                        <el-space>
                            <el-button @click="dictImportPreviewOpen=false">取消</el-button>
                            <el-button type="primary" :disabled="(dictImportErrors||[]).length>0" :loading="dictExcelImportLoading" @click="confirmDictImport">
                                确认导入
                            </el-button>
                        </el-space>
                    </template>
                </el-dialog>
            </el-space>
        </el-tab-pane>

    </el-tabs>
</div>

<script>
const { createApp, ref, onMounted, computed, watch } = Vue;

const API = {
    dictList: '/api/admin/dict/list',
    dictSave: '/api/admin/dict/save',
    dictTypes: '/api/admin/dict/types',
    dictExport: '/api/admin/dict/export',
    dictImport: '/api/admin/dict/import',
    dictImportPreview: '/api/admin/dict/import/preview',
    metaConfigFile: '/api/admin/meta/config'
};

const STATIC_FORM_META_TABLE_OPTIONS = [
    {
        value: 'formmain_0026',
        label: '模拟付息（formmain_0026）',
        tableName: 'formmain_0026',
        showName: '模拟付息',
        remark: '',
        fields: [
            { value: 'field0009', label: '关联贷款项目（field0009）', showName: '关联贷款项目', remark: '' },
            { value: 'field0022', label: '贷款项目编码（field0022）', showName: '贷款项目编码', remark: '' },
            { value: 'field0010', label: '表单视图引用（field0010）', showName: '表单视图引用', remark: '' },
            { value: 'field0011', label: '下柜资金合计（field0011）', showName: '下柜资金合计', remark: '' },
            { value: 'field0012', label: '贷款余额合计（field0012）', showName: '贷款余额合计', remark: '' },
            { value: 'field0013', label: '计划还本合计（field0013）', showName: '计划还本合计', remark: '' },
            { value: 'field0014', label: '模拟付息合计（field0014）', showName: '模拟付息合计', remark: '' },
            { value: 'field0023', label: '日利息计算控件1（field0023）', showName: '日利息计算控件1', remark: '' },
            { value: 'field0024', label: '是否保存数据（field0024）', showName: '是否保存数据', remark: '' },
            { value: 'field0026', label: '贷款开始日期（field0026）', showName: '贷款开始日期', remark: '' },
            { value: 'field0027', label: '贷款结束日期（field0027）', showName: '贷款结束日期', remark: '' },
            { value: 'field0016', label: '时间（field0016）', showName: '时间', remark: '' },
            { value: 'field0017', label: '下柜资金（field0017）', showName: '下柜资金', remark: '' },
            { value: 'field0018', label: '贷款余额（field0018）', showName: '贷款余额', remark: '' },
            { value: 'field0019', label: '计划还本（field0019）', showName: '计划还本', remark: '' },
            { value: 'field0020', label: '模拟付息（field0020）', showName: '模拟付息', remark: '' },
            { value: 'field0021', label: '备注-还款计划（field0021）', showName: '备注-还款计划', remark: '' }
        ]
    },
    {
        value: 'formmain_0039',
        label: '还款计划表存储表（formmain_0039）',
        tableName: 'formmain_0039',
        showName: '还款计划表存储表',
        remark: '',
        fields: [
            { value: 'field0001', label: '单据编号（field0001）', showName: '单据编号', remark: '' },
            { value: 'field0012', label: '最新利率（field0012）', showName: '最新利率', remark: '' },
            { value: 'field0013', label: '还本模式（field0013）', showName: '还本模式', remark: '' },
            { value: 'field0014', label: '付息模式（field0014）', showName: '付息模式', remark: '' },
            { value: 'field0042', label: '利率生效时间（field0042）', showName: '利率生效时间', remark: '' },
            { value: 'field0034', label: '下柜资金合计（field0034）', showName: '下柜资金合计', remark: '' },
            { value: 'field0027', label: '下柜资金（field0027）', showName: '下柜资金', remark: '' },
            { value: 'field0029', label: '还本（field0029）', showName: '还本', remark: '' }
        ]
    },
    {
        value: 'formmain_0029',
        label: '还款计划表（每日）（formmain_0029）',
        tableName: 'formmain_0029',
        showName: '还款计划表（每日）',
        remark: '',
        fields: [
            { value: 'field0001', label: '单据编号（field0001）', showName: '单据编号', remark: '' },
            { value: 'field0042', label: '最新利率（field0042）', showName: '最新利率', remark: '' },
            { value: 'field0013', label: '还本模式（field0013）', showName: '还本模式', remark: '' },
            { value: 'field0014', label: '付息模式（field0014）', showName: '付息模式', remark: '' },
            { value: 'field0041', label: '利率生效时间（field0041）', showName: '利率生效时间', remark: '' },
            { value: 'field0034', label: '下柜资金合计（field0034）', showName: '下柜资金合计', remark: '' },
            { value: 'field0027', label: '下柜资金（field0027）', showName: '下柜资金', remark: '' },
            { value: 'field0029', label: '还本（field0029）', showName: '还本', remark: '' }
        ]
    }
];

createApp({
    setup() {
        const isFileMode = window.location.protocol === 'file:';
        const activeTab = ref('dict');
        const dictRows = ref([]);
        const dictKeyword = ref('');
        const dictViewType = ref('');
        const dictSaving = ref(false);
        const dictTypes = ref([]);
        const dictExcelType = ref('');
        const dictExcelImportLoading = ref(false);
        const dictExcelExportLoading = ref(false);
        const dictImportPreviewOpen = ref(false);
        const dictImportPreview = ref(null);
        const dictImportErrors = ref([]);
        const dictImportPendingFile = ref(null);
        const formMetaTableOptions = ref([]);
        // 字典筛选：字段维度（fieldCode）
        const dictFieldFilter = ref('');
        const dictFieldOptions = computed(() => {
            const vt = String(dictViewType.value || '').trim();
            if (!vt) return [];
            const one = (formMetaTableOptions.value || []).find(x => x && String(x.tableName || '').trim() === vt);
            if (!one || !Array.isArray(one.fields)) return [];
            return one.fields.map(f => ({
                value: String((f && f.value) || '').trim(),
                label: String((f && f.label) || '').trim() || String((f && f.value) || '').trim()
            })).filter(x => x.value);
        });
        const dictDirty = ref(false);
        const dictSnapshotJson = ref('[]');
        const dictTypeUsedBySqlKeys = computed(() => ({}));
        function dedupDictRows(rows) {
            const map = new Map();
            for (const r of (rows || [])) {
                if (!r) continue;
                const dt = String((r && r.dictType) || '').trim();
                const dk = String((r && r.dictKey) || '').trim();
                const key = dt + '||' + dk;
                map.set(key, r); // 后写覆盖前写，保留用户最后一次编辑
            }
            return Array.from(map.values());
        }
        function getTableDisplayName(dictType) {
            const dt = String(dictType || '').trim();
            if (!dt) return '';
            const one = (formMetaTableOptions.value || []).find(x => x && String(x.tableName || '').trim() === dt);
            return one ? String(one.showName || one.tableName || dt) : dt;
        }
        function findMetaRemark(dictType, dictKey) {
            const dt = String(dictType || '').trim();
            const dk = String(dictKey || '').trim();
            if (!dt || !dk) return '';
            const t = (formMetaTableOptions.value || []).find(x => x && String(x.tableName || '').trim() === dt);
            if (!t) return '';
            if (String(t.tableName || '').trim() === dk) return String(t.remark || '').trim();
            const f = (Array.isArray(t.fields) ? t.fields : []).find(x => x && String(x.value || '').trim() === dk);
            return f ? String(f.remark || '').trim() : '';
        }

        async function apiGet(url) {
            if (isFileMode) {
                return { success: false, message: 'file 模式不调用后端' };
            }
            const r = await fetch(url);
            return r.json();
        }
        async function apiPost(url, body) {
            if (isFileMode) {
                return { success: false, message: 'file 模式不调用后端' };
            }
            const r = await fetch(url, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(body)
            });
            return r.json();
        }

        const dictRowsFiltered = computed(() => {
            const kw = (dictKeyword.value || '').trim().toLowerCase();
            const vt = (dictViewType.value || '').trim();      // 表名（dictType / mainTable）
            const field = (dictFieldFilter.value || '').trim(); // 字段名（fieldCode / dictKey）
            // 未选择表时不显示任何行（主筛选）
            if (!vt) return [];
            // 前端保护：同一 dictType+dictKey 只展示一条，避免本地编辑态出现重复视觉行
            const dedupRows = dedupDictRows(dictRows.value || []);
            return dedupRows.filter(r => {
                const dt0 = String((r && r.dictType) || '').trim();
                const dk0 = String((r && r.dictKey) || '').trim();
                // 1️⃣ 表筛选：只看当前表
                if (dt0 !== vt) return false;
                // 2️⃣ 字段筛选：如果选了 field，只看该字段
                if (field && dk0 !== field) return false;
                // 3️⃣ 关键字：模糊匹配 dictKey / dictValue / remark，忽略大小写
                if (!kw) return true;
                const k = dk0.toLowerCase();
                const v = String((r && r.dictValue) || '').toLowerCase();
                const rm = String((r && r.remark) || '').toLowerCase();
                return k.includes(kw) || v.includes(kw) || rm.includes(kw);
            });
        });

        function deriveDictTypesFromDictRows() {
            const set = new Set();
            for (const r of (dictRows.value || [])) {
                const dt = String((r && r.dictType) || '').trim();
                if (dt) set.add(dt);
            }
            return Array.from(set);
        }

        async function loadDictTypes() {
            let fromApi = [];
            try {
                const res = await apiGet(API.dictTypes);
                if (res && res.success) fromApi = res.data || [];
            } catch (e) {}

            // 兼容后端可能返回 array / object 包装（如 {types:[...]} 或 map）
            const toArray = (v) => {
                if (Array.isArray(v)) return v;
                if (v == null) return [];
                if (typeof v === 'object') {
                    if (Array.isArray(v.types)) return v.types;
                    if (Array.isArray(v.rows)) return v.rows;
                    if (Array.isArray(v.list)) return v.list;
                    return Object.values(v);
                }
                return [];
            };

            const apiTypes = toArray(fromApi)
                .map(t => String(t || '').trim())
                .filter(Boolean);
            const localTypes = deriveDictTypesFromDictRows();
            dictTypes.value = Array.from(new Set([].concat(apiTypes, localTypes)));
            if (!dictExcelType.value && dictTypes.value.length > 0) dictExcelType.value = dictTypes.value[0];
        }

        async function loadDict() {
            const res = await apiGet(API.dictList);
            if (!res.success) {
                ElementPlus.ElMessage.error(res.message || '加载字典失败');
                return;
            }
            // 兼容多种后端返回结构：[] / {rows:[]} / {list:[]} / {records:[]}
            const raw = res.data;
            const rows = Array.isArray(raw)
                ? raw
                : (raw && Array.isArray(raw.rows)) ? raw.rows
                : (raw && Array.isArray(raw.list)) ? raw.list
                : (raw && Array.isArray(raw.records)) ? raw.records
                : [];

            dictRows.value = rows.map(d => ({
                dictType: d.dictType || '',
                dictKey: d.dictKey || '',
                dictValue: d.dictValue || '',
                remark: (!d.remark || String(d.remark).trim() === '来源: form_meta_config')
                    ? (findMetaRemark(d.dictType, d.dictKey) || d.remark || '')
                    : (d.remark || '')
            }));
            dictSnapshotJson.value = JSON.stringify(dictRows.value || []);
            dictDirty.value = false;
            await loadDictTypes();
        }

        watch(dictRows, () => {
            try {
                dictDirty.value = JSON.stringify(dictRows.value || []) !== (dictSnapshotJson.value || '[]');
            } catch (e) {
                dictDirty.value = true;
            }
        }, { deep: true });

        async function confirmDiscardDictEditsIfNeeded(actionName) {
            if (!dictDirty.value) return true;
            try {
                await ElementPlus.ElMessageBox.confirm(
                    '数据字典存在未保存修改，是否继续' + (actionName ? ('（' + actionName + '）') : '') + '？未保存内容将丢失。',
                    '未保存修改',
                    { type: 'warning' }
                );
                return true;
            } catch (e) {
                return false;
            }
        }

        async function loadDictWithConfirm() {
            const ok = await confirmDiscardDictEditsIfNeeded('刷新');
            if (!ok) return;
            await loadDict();
        }

        // 根据当前选择的表/字段，确保 dictRows 中至少有一条对应记录（如果没有则自动补一行）
        function ensureRowForCurrentSelection() {
            const table = String(dictViewType.value || '').trim();
            if (!table) return;

            const metaTable = (formMetaTableOptions.value || []).find(
                x => x && String(x.tableName || '').trim() === table
            );
            if (!metaTable) return;

            const fieldCode = String(dictFieldFilter.value || '').trim();
            const fields = Array.isArray(metaTable.fields) ? metaTable.fields : [];

            // 情况一：只选了表（未选字段）
            // 期望：把该表下所有字段都拉出来一行一行配置；
            // 如果之前已经有部分字段的字典行，只补“缺的那几项”即可
            if (!fieldCode) {
                for (const f of fields) {
                    if (!f) continue;
                    const code = String((f.value || f.code || '')).trim();
                    if (!code) continue;
                    const exists = (dictRows.value || []).some(r =>
                        String((r && r.dictType) || '').trim() === table &&
                        String((r && r.dictKey) || '').trim() === code
                    );
                    if (exists) continue;
                    const labelName = String((f.showName || f.label || '')).trim();
                    const metaRemark = String((f.remark || '')).trim();
                    dictRows.value.push({
                        dictType: table,
                        dictKey: code,
                        dictValue: code,
                        remark: metaRemark || labelName || ''
                    });
                }
                return;
            }

            // 情况二：选中了具体字段 → 只补这一行
            const f = fields.find(ff => ff && String((ff.value || ff.code || '')).trim() === fieldCode);
            if (!f) return;
            const key = fieldCode;
            const labelName = String((f.showName || f.label || '')).trim();
            const metaRemark = String((f.remark || '')).trim();

            const existsIdx = (dictRows.value || []).findIndex(r =>
                String((r && r.dictType) || '').trim() === table &&
                String((r && r.dictKey) || '').trim() === key
            );
            if (existsIdx >= 0) {
                return;
            }

            dictRows.value.push({
                dictType: table,
                dictKey: key,
                dictValue: key,
                remark: metaRemark || labelName || ''
            });
        }

        function addDictRow() {
            const table = String(dictViewType.value || '').trim();
            const fieldCode = String(dictFieldFilter.value || '').trim();

            if (!table) {
                ElementPlus.ElMessage.warning('请先在下方选择表（dictType）再新增一行');
                return;
            }

            let key = '';
            let labelName = '';
            let metaRemark = '';

            if (fieldCode) {
                const metaTable = (formMetaTableOptions.value || []).find(
                    x => x && String(x.tableName || '').trim() === table
                );
                if (metaTable) {
                    const fields = Array.isArray(metaTable.fields) ? metaTable.fields : [];
                    const f = fields.find(ff => ff && String(ff.value || '').trim() === fieldCode);
                    if (f) {
                        key = fieldCode;
                        labelName = String((f && f.showName) || (f && f.label) || '').trim();
                        metaRemark = String((f && f.remark) || '').trim();
                    }
                }
            }

            // 若未选字段或未在元数据中找到，则允许手动填写字段名
            if (!key && fieldCode) {
                key = fieldCode;
            }

            dictRows.value.push({
                dictType: table,
                dictKey: key,
                dictValue: key,                      // 默认用 code 作为字段名称
                remark: metaRemark || labelName || ''// 默认用字段中文名/remark
            });
        }
        function removeDictRow(row) {
            if (!row) return;
            // dictRowsFiltered 是基于 dictRows 去重/过滤后的视图，这里需要在原始 dictRows 中找到对应行再删除
            const idx = (dictRows.value || []).findIndex(r =>
                r === row ||
                (String((r && r.dictType) || '').trim() === String((row && row.dictType) || '').trim() &&
                 String((r && r.dictKey) || '').trim() === String((row && row.dictKey) || '').trim() &&
                 String((r && r.dictValue) || '').trim() === String((row && row.dictValue) || '').trim())
            );
            if (idx >= 0) {
                dictRows.value.splice(idx, 1);
            }
        }

        async function saveDict() {
            dictSaving.value = true;
            try {
                // 保存前自动合并重复 key，避免后端持久化重复行
                dictRows.value = dedupDictRows(dictRows.value || []);
                const res = await apiPost(API.dictSave, dictRows.value);
                if (!res.success) {
                    ElementPlus.ElMessage.error(res.message || '保存失败');
                    return;
                }
                ElementPlus.ElMessage.success('字典已保存');
                await loadDict();
            } finally {
                dictSaving.value = false;
            }
        }

        async function exportDictExcel() {
            const dt = String(dictViewType.value || dictExcelType.value || '').trim();
            if (!dt) {
                ElementPlus.ElMessage.warning('请先在下方筛选中选择当前 dictType');
                return;
            }
            dictExcelExportLoading.value = true;
            try {
                const url = API.dictExport + '?dictType=' + encodeURIComponent(dt);
                const resp = await fetch(url);
                if (!resp.ok) throw new Error((await resp.text()) || '导出失败');
                const blob = await resp.blob();
                const downloadUrl = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = downloadUrl;
                a.download = 'sys_dict_' + dt + '.xlsx';
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(downloadUrl);
                ElementPlus.ElMessage.success('导出成功');
            } catch (e) {
                ElementPlus.ElMessage.error('导出失败：' + (e && e.message ? e.message : e));
            } finally {
                dictExcelExportLoading.value = false;
            }
        }

        function openDictImportDialog() {
            const el = document.getElementById('dictImportFile');
            if (!el) return;
            el.value = '';
            el.click();
        }

        function resetDictImportPreviewState() {
            dictImportPreviewOpen.value = false;
            dictImportPreview.value = null;
            dictImportErrors.value = [];
            dictImportPendingFile.value = null;
        }

        async function onDictImportFileChange(evt) {
            try {
                const dt = String(dictViewType.value || dictExcelType.value || '').trim();
                if (!dt) {
                    ElementPlus.ElMessage.warning('请先在下方筛选中选择当前 dictType');
                    return;
                }
                const file = evt && evt.target ? evt.target.files[0] : null;
                if (!file) return;
                dictExcelImportLoading.value = true;
                dictImportPendingFile.value = file;
                dictImportErrors.value = [];
                dictImportPreview.value = null;

                const fd = new FormData();
                fd.append('file', file);
                const url = API.dictImportPreview + '?dictType=' + encodeURIComponent(dt);
                const resp = await fetch(url, { method: 'POST', body: fd });
                const json = await resp.json().catch(() => null);
                if (!resp.ok || !json) throw new Error('预览失败');
                if (!json.success) {
                    dictImportErrors.value = Array.isArray(json.data) ? json.data : [];
                    dictImportPreviewOpen.value = true;
                    return;
                }
                dictImportPreview.value = json.data || null;
                dictImportPreviewOpen.value = true;
            } catch (e) {
                ElementPlus.ElMessage.error('预览失败：' + (e && e.message ? e.message : e));
            } finally {
                dictExcelImportLoading.value = false;
                const el = document.getElementById('dictImportFile');
                if (el) el.value = '';
            }
        }

        async function confirmDictImport() {
            const dt = String(dictViewType.value || dictExcelType.value || '').trim();
            if (!dt) {
                ElementPlus.ElMessage.warning('请先在下方筛选中选择当前 dictType');
                return;
            }
            if (!dictImportPendingFile.value) {
                ElementPlus.ElMessage.warning('未选择文件');
                return;
            }
            dictExcelImportLoading.value = true;
            try {
                const fd = new FormData();
                fd.append('file', dictImportPendingFile.value);
                const url = API.dictImport + '?dictType=' + encodeURIComponent(dt);
                const resp = await fetch(url, { method: 'POST', body: fd });
                const json = await resp.json().catch(() => null);
                if (!resp.ok || !json || !json.success) {
                    throw new Error((json && json.message) ? json.message : '导入失败');
                }
                ElementPlus.ElMessage.success(json.message || '导入成功');
                resetDictImportPreviewState();
                await loadDict();
                await loadDictTypes();
            } catch (e) {
                ElementPlus.ElMessage.error('导入失败：' + (e && e.message ? e.message : e));
            } finally {
                dictExcelImportLoading.value = false;
                const el = document.getElementById('dictImportFile');
                if (el) el.value = '';
            }
        }

        async function loadFormMetaTableOptions() {
            try {
                // 先使用静态数据，确保 file:// 下也可用
                formMetaTableOptions.value = (STATIC_FORM_META_TABLE_OPTIONS || []).slice();
                const candidates = isFileMode
                    ? ['../config/form_meta_config.json', './config/form_meta_config.json', 'config/form_meta_config.json']
                    : [API.metaConfigFile, '/config/form_meta_config.json', 'config/form_meta_config.json'];
                let json = null;
                let lastErr = '';
                for (const u of candidates) {
                    try {
                        const r = await fetch(u, { method: 'GET' });
                        if (!r.ok) {
                            lastErr = 'HTTP ' + r.status + ' @ ' + u;
                            continue;
                        }
                        const raw = await r.json();
                        // 兼容两种结构：
                        // 1) {success:true, data:{forms:{...}}}
                        // 2) {forms:{...}}（直接 JSON）
                        const body = (raw && raw.success && raw.data) ? raw.data : raw;
                        if (body && body.forms && typeof body.forms === 'object') {
                            json = body;
                            break;
                        }
                        lastErr = '响应缺少 forms @ ' + u;
                    } catch (e) {
                        lastErr = (e && e.message) ? e.message : String(e);
                    }
                }
                if (!json) {
                    formMetaTableOptions.value = [];
                    // file:// 下浏览器通常会拦截本地 fetch，静默回退到内置静态数据，避免反复报错
                    if (isFileMode) {
                        formMetaTableOptions.value = (STATIC_FORM_META_TABLE_OPTIONS || []).slice();
                        return;
                    }
                    ElementPlus.ElMessage.warning('读取表单元数据失败：' + (lastErr || '未知错误'));
                    return;
                }
                const forms = json && json.forms ? json.forms : {};
                const used = new Set();
                const arr = [];
                for (const k of Object.keys(forms)) {
                    const one = forms[k] || {};
                    const table = String(one.mainTable || '').trim();
                    const name = String(one.name || '').trim();
                    if (!table || used.has(table)) continue;
                    used.add(table);
                    const fields = [];
                    const mainFields = Array.isArray(one.mainFields) ? one.mainFields : [];
                    const sons = Array.isArray(one.sons) ? one.sons : [];
                    for (const f of mainFields) {
                        const code = String((f && f.code) || '').trim();
                        const label = String((f && f.label) || '').trim();
                        if (!code) continue;
                        fields.push({ value: code, label: label ? (label + '（' + code + '）') : code, showName: label || code, remark: String((f && f.remark) || '') });
                    }
                    for (const s of sons) {
                        const sf = Array.isArray(s && s.fields) ? s.fields : [];
                        for (const f of sf) {
                            const code = String((f && f.code) || '').trim();
                            const label = String((f && f.label) || '').trim();
                            if (!code) continue;
                            fields.push({ value: code, label: label ? (label + '（' + code + '）') : code, showName: label || code, remark: String((f && f.remark) || '') });
                        }
                    }
                    const seenField = new Set();
                    const dedupFields = fields.filter(x => {
                        if (!x || !x.value || seenField.has(x.value)) return false;
                        seenField.add(x.value);
                        return true;
                    });
                    arr.push({
                        value: table,
                        label: name ? (name + '（' + table + '）') : table,
                        tableName: table,
                        showName: name || table,
                        remark: String((one && one.remark) || ''),
                        fields: dedupFields
                    });
                }
                formMetaTableOptions.value = arr;
            } catch (e) {
                formMetaTableOptions.value = [];
                ElementPlus.ElMessage.warning('读取表单元数据失败：' + ((e && e.message) ? e.message : e));
            }
        }

        function onTabChange(name) {
            if (activeTab.value === 'dict' && name !== 'dict') {
                confirmDiscardDictEditsIfNeeded('切换Tab').then(ok => {
                    if (!ok) activeTab.value = 'dict';
                });
            }
        }

        onMounted(async () => {
            window.addEventListener('beforeunload', (e) => {
                if (dictDirty.value) {
                    e.preventDefault();
                    e.returnValue = '';
                }
            });
            await loadFormMetaTableOptions();
            if (!isFileMode) {
                await loadDict();
                await loadDictTypes();
                // 初次加载后，根据默认选中的表/字段补齐一行（如果需要）
                ensureRowForCurrentSelection();
            }
        });

        // 当用户切换“表”或“字段”时，如果当前组合在字典中不存在，则自动补一行
        watch([dictViewType, dictFieldFilter], () => {
            ensureRowForCurrentSelection();
        });

        return {
            activeTab,
            onTabChange,
            dictRows,
            dictRowsFiltered,
            dictFieldFilter,
            dictFieldOptions,
            dictKeyword,
            dictViewType,
            dictSaving,
            loadDict,
            loadDictWithConfirm,
            addDictRow,
            removeDictRow,
            saveDict,
            dictDirty,
            dictTypeUsedBySqlKeys,
            dictTypes,
            dictExcelType,
            exportDictExcel,
            openDictImportDialog,
            onDictImportFileChange,
            dictImportPreviewOpen,
            dictImportPreview,
            dictImportErrors,
            confirmDictImport,
            resetDictImportPreviewState,
            dictExcelImportLoading,
            dictExcelExportLoading,
            getTableDisplayName,
            formMetaTableOptions
        };
    }
}).use(ElementPlus).mount('#app');
</script>
</body>
</html>
